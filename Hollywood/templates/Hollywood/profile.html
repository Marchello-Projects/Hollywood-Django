<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Головна - HOLLYWOOD</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #2b2b2b, #1a1a1a);
            color: white;
        }
        .greeting-card {
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
            width: 400px;
        }
        .greeting-card h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .greeting-card p {
            font-size: 16px;
            margin-bottom: 30px;
            color: #cccccc;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            margin: 5px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .btn-login {
            background-color: white;
            color: black;
            border: 1px solid white;
        }
        .btn-login:hover {
            background-color: black;
            color: white;
        }
        .btn-register {
            background-color: transparent;
            color: white;
            border: 1px solid white;
        }
        .btn-register:hover {
            background-color: white;
            color: black;
        }
        .btn-profile {
            background-color: #8C80ED;
            color: white;
            border: 1px solid #8C80ED;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-profile:hover {
            background-color: transparent;
        }
    </style>
</head>
<body>

    <div class="greeting-card">
        <h1>HOLLYWOOD 🦷</h1>
        <p>Ваша ідеальна посмішка починається тут.</p>

        {% if user.is_authenticated %}
            <p style="color: white; font-weight: 600;">Привіт, {{ user.full_name }}!</p>
            <a href="{% url 'patient_profile' %}" class="btn btn-profile">Особистий кабінет</a>
        {% else %}
            <a href="{% url 'login' %}" class="btn btn-login">Увійти</a>
            <a href="{% url 'register' %}" class="btn btn-register">Зареєструватися</a>
        {% endif %}
    </div>

</body>
</html>
